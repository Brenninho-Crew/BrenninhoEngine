name: Build Android Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.6

      - name: Install Dependencies
        run: |
          haxelib setup ~/haxelib
          
          # Bibliotecas básicas
          haxelib install hxcpp
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui
          haxelib install hxCodec
          haxelib install hscript
          
          # LuaJIT
          haxelib git linc_luajit https://github.com/nebulazorua/linc_luajit
          
          # Android Tools (CORRIGIDO)
          haxelib remove extension-androidtools
          haxelib git extension-androidtools https://github.com/jigsaw-4277821/extension-androidtools

      - name: Setup Android
        run: |
          haxelib run lime setup
          haxelib run lime setup android -y
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_ROOT

      - name: Build APK
        run: haxelib run lime build android

      - name: Rename APK
        run: |
          APK=$(find export -name "*.apk" | head -1)
          cp "$APK" BrenninhoEngine.apk

      - uses: actions/upload-artifact@v4
        with:
          name: BrenninhoEngine-Android
          path: BrenninhoEngine.apk