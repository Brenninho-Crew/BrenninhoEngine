name: Build Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.6

      - name: Install Dependencies
        run: |
          # Instalar haxelibs básicas
          haxelib setup ~/haxelib
          haxelib install hxcpp
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui
          haxelib install hxCodec
          
          # LuaJIT
          haxelib git linc_luajit https://github.com/nebulazorua/linc_luajit
          
          # Android tools
          haxelib git extension-androidtools https://github.com/jigsaw-4277821/extension-androidtools

      - name: Setup Android
        run: |
          haxelib run lime setup
          haxelib run lime setup android -y

      - name: Build APK (Debug)
        run: haxelib run lime build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BrenninhoEngine-Android-Debug
          path: |
            export/debug/android/bin/app/build/outputs/apk/debug/*.apk
            export/**/*.apk
            **/*.apk
          if-no-files-found: warn